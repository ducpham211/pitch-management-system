version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: futsal-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: futsal-backend
    ports:
      - "8080:8080"
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    restart: unless-stopped

